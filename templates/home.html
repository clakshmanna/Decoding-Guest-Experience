{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Decoding Guest Experience NLP Driven Sentiment Analysis Of Hotel Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;

            /* Background image */
            background: url("{% static 'OIP.jpeg' %}") no-repeat center center fixed;
            background-size: cover;

            /* Overlay for readability */
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); /* dark overlay */
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1; /* keep card above overlay */
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
            padding: 30px;
            background: #fff;
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            font-weight: bold;
            color: #333;
        }

        textarea {
            resize: none;
            border-radius: 10px;
            border: 1px solid #ced4da;
            padding: 15px;
            width: 100%;
        }

        .btn-primary {
            border-radius: 10px;
            padding: 10px 25px;
            background: #0d6efd;
            border: none;
        }

        .btn-primary:hover {
            background: #0b5ed7;
        }

        .btn-secondary {
            border-radius: 10px;
            padding: 10px 25px;
        }

        .alert {
            margin-top: 20px;
            border-radius: 12px;
            font-weight: bold;
        }
    </style>
</head>

<body>
{% block content %}
<div class="card">
    <h1>Decoding Guest Experience NLP Driven Sentiment Analysis Of Hotel Reviews</h1>

    <form method="POST">
        {% csrf_token %}
        <textarea name="review_text" rows="5" placeholder="Type your review here..." required></textarea>

        <div class="mt-3 d-flex justify-content-center gap-2">
            <button type="submit" class="btn btn-primary">Analyze</button>
            <a href="{% url 'upload_dataset' %}" class="btn btn-secondary">Upload Dataset</a>
        </div>
    </form>

    {% if sentiment %}
        <div class="alert alert-info mt-4">
            Sentiment: <strong>{{ sentiment|capfirst }}</strong>
        </div>
    {% endif %}
</div>
{% endblock %}

</body>
</html>
